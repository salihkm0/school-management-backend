version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: school-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: school_management

  redis:
    image: redis:7-alpine
    container_name: school-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: school-backend
    restart: always
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      - mongodb
      - redis
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/school_management?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

volumes:
  mongodb_data:
  redis_data: